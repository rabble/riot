[alias]
xtask = "run --package xtask --"

# Android target linkers are NOT hardcoded here — an absolute NDK path only works
# on one machine. scripts/conference/build-native-core.sh is the sanctioned way
# to build the Android staticlibs; it derives the NDK toolchain from
# $ANDROID_SDK_ROOT / $ANDROID_HOME / $ANDROID_NDK_HOME and sets
# CARGO_TARGET_*_LINUX_ANDROID_LINKER itself, so it works on any host and in CI.

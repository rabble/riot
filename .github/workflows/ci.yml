name: CI

# Fast quality gate. Everything here runs on Ubuntu — none of these jobs need
# the generated `build/` tree (UniFFI bindings + native staticlibs) that the
# iOS/Android app builds depend on, so no cross-compile is required. Native app
# CI is tracked separately (see docs/ci/native-ci-requirements.md).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins channel 1.95.0; rustup honours it on first use.
      # The pinned toolchain has no components declared, so add them explicitly.
      - name: Install pinned toolchain components
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add clippy rustfmt

      # Purpose-built Rust cache: toolchain-aware keys, caches registry/git/target,
      # and auto-trims stale build artifacts. Turns the ~9min cold compile into
      # ~1-2min warm on later runs. Must come after the toolchain is installed.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features

      # Enforces the willow25 / bab_rs alpha pins. Stable releases compute
      # incorrect WILLIAM3 digests; this is the only automated check of that.
      - name: validate contracts
        run: cargo run -p xtask -- validate-contracts

  coverage:
    name: Rust coverage (llvm-cov line floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain + llvm-tools
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add llvm-tools-preview

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      # Enforce the ratchet floor from the single source of truth. Before this
      # job the documented 100% gate was fiction (nothing read the file, no
      # automated context ran it). Uses cargo-llvm-cov (source-based LLVM
      # instrumentation) rather than tarpaulin: tarpaulin's ptrace engine
      # hangs on this workspace under CI (the job ran >25min without completing).
      # llvm-cov measures line coverage reliably. The floor is just below the
      # measured value (llvm lines 97.75%) — green today, blocks regression.
      - name: Enforce line-coverage floor
        run: |
          floor=$(jq -r '.thresholds.llvm.lines' .coverage-thresholds.json)
          echo "Enforcing llvm-cov line-coverage floor: ${floor}%"
          cargo llvm-cov --workspace --all-features --fail-under-lines "$floor"

  gateway:
    name: Gateway (Python unittest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # Tests are standard-library only — no pip install step needed.
      - name: unittest
        working-directory: apps/gateway
        run: python3 -m unittest discover -s tests

  web:
    name: Web tooling (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26.4.0'
      # Unit tests import only node builtins + local .mjs files. --ignore-scripts
      # skips the Playwright browser download (unused by the unit suite).
      - name: install
        run: npm ci --ignore-scripts
      - name: unit tests
        run: npm run test:web:unit

  android:
    name: Android (host-JVM unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Host-JVM unit tests only (:app:testDebugUnitTest). They construct core's
      # projected records on the JVM and assert the client mapping — they never
      # load libriot_ffi.so (UniFFI's Kotlin only calls System.loadLibrary when
      # an FFI *function* runs, never when a generated record/enum is merely
      # constructed). So this job needs the generated Kotlin bindings but NOT the
      # cross-compiled Android .so ABIs — no NDK, no emulator, cheap on Ubuntu.
      # It guards the class of break where a UniFFI record changes and the
      # Android host-test helpers aren't updated (main went latently RED this way
      # when iOS PR #53 added a `comments` field). See docs/ci/native-ci-requirements.md.

      # AGP 9 and the Gradle 9.1 wrapper both require JDK 17.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Provisions cmdline-tools and accepts all SDK licenses. AGP then
      # auto-downloads the compileSdk 36 platform + build-tools it needs
      # (android.builder.sdkDownload defaults on) against ANDROID_HOME/
      # ANDROID_SDK_ROOT, which this action exports.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # rust-toolchain.toml pins channel 1.95.0; rustup honours it on first use.
      # generate-bindings compiles xtask + riot-ffi metadata — no extra components.
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # Regenerates build/generated/riot-ffi/uniffi/**/riot_ffi.kt, which the
      # Android main source set compiles against. Without this the app module
      # cannot compile and the unit tests cannot run.
      - name: Generate UniFFI Kotlin bindings
        run: cargo run --locked -p xtask -- generate-bindings

      # Gradle caching (wrapper dist + dependencies + build cache).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Gradle reads the SDK path from ANDROID_HOME/ANDROID_SDK_ROOT (exported by
      # setup-android) when local.properties is absent, so no sdk.dir file needed.
      - name: Host-JVM unit tests
        working-directory: apps/android
        run: ./gradlew :app:testDebugUnitTest

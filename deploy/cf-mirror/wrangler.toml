# Cloudflare Worker: a hosted dev MIRROR of a Riot site's reach-layer view.
#
# This is NOT a publisher. Publishing stays p2p/hidden. This worker is a dumb
# host serving the self-contained static dump (see
# docs/superpowers/specs/2026-07-16-web-viewer-reach-layer-design.md). It gives
# dev a stable URL to point at; the same bytes could sit on any other mirror.
#
# Deploy: `npm run build && npx wrangler deploy` (needs your Cloudflare login).
name = "riot-newswire-dev"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# Static assets = the rendered dump. run_worker_first routes every request
# through the worker first so it can add security headers before serving the
# asset (otherwise assets are served directly and the wrapper never runs).
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# DYNAMIC tier: the live projection lives in KV, written by the seed
# (seed.sh: project → push). The worker reads KV per request, so updating the
# store updates the site with NO redeploy. Static assets are the fallback.
[[kv_namespaces]]
binding = "NEWSWIRE"
id = "94646e705b474307a38f61b169ab9d5e"
